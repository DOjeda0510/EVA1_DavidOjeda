<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />

    <link rel="stylesheet" href="style.css" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <header>
        <h1>🎮Estacion Arcade🕹️</h1>
    </header>
    
    <section id="seccion-juegos">
        <h2>NOVEDADES</h2>
        <div class="contenedor-galeria">
            <a href="gta.html" style="text-decoration: none; color: inherit;">
                <div class="juegos">
                    <img src="pagina/img/img-gta/gta.jpg" alt="Grand Theft Auto V" />
                    <h3>Grand Theft Auto V</h3>
                    <p>$29.900 CLP</p>
                </div>
            </a>

            <a href="DLTB.html" style="text-decoration: none; color: inherit;">
                <div class="juegos">
                    <img src="pagina/img/dyli.jpg" alt="Dying light The Beast" />
                    <h3>Dying light The Beast</h3>
                    <p>$40.499 CLP</p>
                </div>
            </a>

            <a href="SOT.html" style="text-decoration: none; color: inherit;">
                <div class="juegos">
                    <img src="pagina/img/seaoft.jpg" alt="Sea of Thieves" />
                    <h3>Sea of Thieves</h3>
                    <p>$39.900 CLP</p>
                </div>
            </a>

            <a href="TLO" style="text-decoration: none; color: inherit;">
                <div class="juegos">
                    <img src="pagina/img/TLO1.jpg" alt="The Last Of Us" />
                    <h3>The Last Of Us</h3>
                    <p>$57.000 CLP</p>
                 </div>

            </a>

        </div>
        </section>
        
        <section id="seccion-formulario">
            <h2>CONTACTANOS📞</h2>

            <form id="formulario-contacto" action="gracias.html" method="get">
                <!--Campo para el nombre-->
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required minlength="3">
                <!--Campo para el Apellido-->
                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" name="apellido" required minlength="3">
                <!--Campo para el email-->
                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" required>
                <!--Campo para el mensaje-->
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" required></textarea>
                <!--Boton de envio-->
                <button type="submit">Enviar</button>
            </form>
        </section>



        <footer>
            <p>&copy;2026 Empresa de videojuegos. Todos los derechos reservados.</p>
            <p style="font-size: 0.8em; opacity: 0.6;">Diseñado por David Ojeda</p>
        </footer>






</body>


</html>
