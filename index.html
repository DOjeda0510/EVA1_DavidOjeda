<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Estacion Arcade - !Tu entretencion total¡</title>
    <link rel="stylesheet" href="style.css" />
    <meta charset="utf-8" />
</head>
<body>
    <header>
        <h1>Estacion Arcade</h1>
    </header>


    <section id="seccion-formulario">
        <h2>CONTACTANOS</h2>
        
        <form id="formulario-contacto" action="gracias.html" method="get">
            <!--Campo para el nombre-->
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required minlength="3">
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" required minlength="3">
            <!--Campo para el email-->
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" required>
            <!--Campo para el mensaje-->
            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" required></textarea>
            <!--Boton de envio-->
            <button type="submit">Enviar</button>
        </form>
    </section>
            
    
    
    <footer>
        <p>&copy;2026 Empresa de videojuegos. Todos los derechos reservados.</p>
    </footer>






</body>


</html>
